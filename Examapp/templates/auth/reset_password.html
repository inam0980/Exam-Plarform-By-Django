{% extends 'base.html' %}
{% block title %}Reset Password - Exam System{% endblock %}
{% block content %}
<div class="card" style="max-width:450px; margin:4rem auto;">
    <div style="text-align:center; margin-bottom:1.5rem;">
        <div style="font-size:2.5rem;">🔒</div>
        <h2 style="margin:0.3rem 0;">Set New Password</h2>
        <p style="color:#7f8c8d; font-size:0.9rem; margin:0;">
            OTP verified. Enter your new password below.
        </p>
    </div>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" required autofocus
                   minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required
                   minlength="6" placeholder="Re-enter new password">
        </div>
        <button type="submit" class="btn btn-success" style="width:100%; margin-top:0.5rem;">Reset Password</button>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Edit Exam — {{ exam.title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:700px; margin:0 auto;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>✏️ Edit Exam</h2>
        <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">← Back</a>
    </div>
    <hr>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Exam Title</label>
            <input type="text" id="title" name="title" required value="{{ exam.title }}">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ exam.description }}</textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="duration_minutes">Duration (minutes)</label>
                <input type="number" id="duration_minutes" name="duration_minutes" required min="1" value="{{ exam.duration_minutes }}">
            </div>
            <div class="form-group">
                <label for="total_marks">Total Marks</label>
                <input type="number" id="total_marks" name="total_marks" required min="1" value="{{ exam.total_marks }}">
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="passing_marks">Passing Marks</label>
                <input type="number" id="passing_marks" name="passing_marks" required min="1" value="{{ exam.passing_marks }}">
            </div>
        </div>

        <hr style="margin:1.2rem 0;">
        <h3 style="color:#e67e22; margin-bottom:0.8rem;">🕐 Time Slot</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="start_time">Start Time</label>
                <input type="datetime-local" id="start_time" name="start_time" required value="{{ start_time_str }}">
            </div>
            <div class="form-group">
                <label for="end_time">End Time <small style="color:#27ae60; font-weight:normal;">(auto-calculated or set manually)</small></label>
                <input type="datetime-local" id="end_time" name="end_time" required value="{{ end_time_str }}" style="background:#f0fdf4;">
            </div>
        </div>

        <div class="form-group">
            <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                <input type="checkbox" name="is_published" id="is_published" style="width:auto;" {% if exam.is_published %}checked{% endif %}>
                <span>Published (students can see and start the exam)</span>
            </label>
        </div>
        <button type="submit" class="btn btn-success" style="width:100%;">💾 Save Changes</button>
    </form>
</div>
<script>
function calcEndTime() {
    const startVal = document.getElementById('start_time').value;
    const duration = parseInt(document.getElementById('duration_minutes').value) || 0;
    if (!startVal || !duration) return;
    const start = new Date(startVal);
    const end = new Date(start.getTime() + duration * 60000);
    const pad = n => String(n).padStart(2, '0');
    const formatted = end.getFullYear() + '-' + pad(end.getMonth()+1) + '-' + pad(end.getDate()) +
                      'T' + pad(end.getHours()) + ':' + pad(end.getMinutes());
    document.getElementById('end_time').value = formatted;
}
document.getElementById('duration_minutes').addEventListener('input', calcEndTime);
document.getElementById('start_time').addEventListener('input', calcEndTime);
</script>
{% endblock %}

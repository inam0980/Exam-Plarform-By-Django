{% extends 'base.html' %}
{% block title %}Create Exam{% endblock %}
{% block content %}
<div class="card" style="max-width:700px; margin:0 auto;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Create New Exam</h2>
        <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">← Back</a>
    </div>
    <hr>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Exam Title</label>
            <input type="text" id="title" name="title" required placeholder="e.g. Python Final Exam">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Optional exam description..."></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="duration_minutes">Duration (minutes)</label>
                <input type="number" id="duration_minutes" name="duration_minutes" required min="1" placeholder="60">
            </div>
            <div class="form-group">
                <label for="total_marks">Total Marks</label>
                <input type="number" id="total_marks" name="total_marks" required min="1" placeholder="100">
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="passing_marks">Passing Marks</label>
                <input type="number" id="passing_marks" name="passing_marks" required min="1" placeholder="50">
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="start_time">Start Time</label>
                <input type="datetime-local" id="start_time" name="start_time" required oninput="calcEndTime()">
            </div>
            <div class="form-group">
                <label for="end_time">End Time <small style="color:#27ae60; font-weight:normal;">(auto-calculated)</small></label>
                <input type="datetime-local" id="end_time" name="end_time" required style="background:#f0fdf4;">
            </div>
        </div>
        <div class="form-group">
            <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                <input type="checkbox" name="is_published" id="is_published" style="width:auto;">
                <span>Publish immediately (students can see and start the exam)</span>
            </label>
        </div>
        <button type="submit" class="btn btn-success" style="width:100%;">Create Exam</button>
    </form>
</div>
<script>
function calcEndTime() {
    const startVal = document.getElementById('start_time').value;
    const duration = parseInt(document.getElementById('duration_minutes').value) || 0;
    if (!startVal || !duration) return;
    const start = new Date(startVal);
    const end = new Date(start.getTime() + duration * 60000);
    // Format to datetime-local value: YYYY-MM-DDTHH:MM
    const pad = n => String(n).padStart(2, '0');
    const formatted = end.getFullYear() + '-' + pad(end.getMonth()+1) + '-' + pad(end.getDate()) +
                      'T' + pad(end.getHours()) + ':' + pad(end.getMinutes());
    document.getElementById('end_time').value = formatted;
}

// Also recalculate if duration changes while start_time is already set
document.getElementById('duration_minutes').addEventListener('input', calcEndTime);
document.getElementById('start_time').addEventListener('input', calcEndTime);
</script>
{% endblock %}
